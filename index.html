<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LT Consolidated Dashboard View</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e1117;
    --surface: #161b26;
    --surface2: #1e2536;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8eaf0;
    --muted: #7a8299;
    --accent: #f2a900;
    --accent2: #e8960a;
    --accent-dim: rgba(242,169,0,0.12);
    --accent-glow: rgba(242,169,0,0.25);
    --sidebar-w: 280px;
    --header-h: 60px;
    --radius: 10px;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px 0 24px;
    gap: 16px;
    flex-shrink: 0;
    z-index: 10;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-icon svg { width:16px; height:16px; fill: #1a1000; }
  .logo-text { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .logo-text span { color: var(--accent); }

  .header-divider { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }

  .page-title { font-size: 13px; color: var(--muted); font-weight: 400; }

  header .spacer { flex: 1; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 7px;
    font-size: 13px; font-family: var(--font); font-weight: 500;
    cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
    text-decoration: none;
  }
  .btn-ghost {
    background: transparent; border-color: var(--border2); color: var(--muted);
  }
  .btn-ghost:hover { border-color: var(--border2); background: var(--surface2); color: var(--text); }
  .btn-accent {
    background: var(--accent); color: #1a1000; border-color: transparent;
  }
  .btn-accent:hover { background: var(--accent2); }

  .btn svg { width:14px; height:14px; flex-shrink:0; }

  /* ── LAYOUT ── */
  .layout {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  /* ── SIDEBAR ── */
  aside {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
    transition: width 0.2s ease;
  }
  aside.collapsed { width: 56px; }

  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .sidebar-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.8px;
    text-transform: uppercase; color: var(--muted);
    white-space: nowrap; overflow: hidden;
  }
  aside.collapsed .sidebar-label { opacity: 0; }

  .collapse-btn {
    width: 24px; height: 24px; border-radius: 5px;
    background: transparent; border: none; color: var(--muted);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.15s, color 0.15s;
  }
  .collapse-btn:hover { background: var(--surface2); color: var(--text); }
  .collapse-btn svg { width:14px; height:14px; }
  aside.collapsed .collapse-btn svg { transform: rotate(180deg); }

  .nav-list {
    list-style: none;
    padding: 8px;
    overflow-y: auto;
    flex: 1;
  }

  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.12s;
    border: 1px solid transparent;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
  }
  .nav-item:hover { background: var(--surface2); }
  .nav-item.active {
    background: var(--accent-dim);
    border-color: rgba(242,169,0,0.2);
    color: var(--accent);
  }

  .nav-num {
    width: 22px; height: 22px; border-radius: 5px;
    background: var(--surface2); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-family: var(--mono); font-weight: 500; color: var(--muted);
    transition: background 0.12s, color 0.12s;
  }
  .nav-item.active .nav-num { background: var(--accent-glow); color: var(--accent); }

  .nav-name {
    font-size: 13px; font-weight: 400; color: var(--text);
    flex: 1; overflow: hidden; text-overflow: ellipsis;
    transition: color 0.12s;
  }
  .nav-item.active .nav-name { color: var(--accent); font-weight: 500; }

  .nav-status {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted); flex-shrink: 0;
    transition: background 0.12s;
  }
  .nav-item.active .nav-status { background: var(--accent); }

  aside.collapsed .nav-name,
  aside.collapsed .nav-status { display: none; }

  .sidebar-footer {
    padding: 12px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  aside.collapsed .sidebar-footer .btn { padding: 6px; justify-content: center; }
  aside.collapsed .sidebar-footer .btn span { display: none; }

  /* ── MAIN AREA ── */
  main {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── VIEWS ── */
  .view { display: none; flex: 1; min-height: 0; flex-direction: column; }
  .view.active { display: flex; }

  /* GRID VIEW */
  .grid-header {
    padding: 20px 24px 16px;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .grid-header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.4px; }
  .grid-header .badge {
    font-size: 11px; padding: 3px 10px; border-radius: 20px;
    background: var(--accent-dim); color: var(--accent);
    font-weight: 500; letter-spacing: 0.3px;
  }
  .grid-header .spacer { flex: 1; }
  .grid-controls { display: flex; gap: 8px; }

  .grid-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 0 24px 24px;
  }

  .dashboard-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  .dash-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.12s;
    display: flex; flex-direction: column;
    position: relative;
  }
  .dash-card:hover {
    border-color: var(--border2);
    transform: translateY(-1px);
  }
  .dash-card.focused { border-color: rgba(242,169,0,0.4); }

  .card-topbar {
    padding: 10px 14px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
  }
  .card-topbar .dots { display: flex; gap: 4px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-r { background: #ff5f57; }
  .dot-y { background: #febc2e; }
  .dot-g { background: #28c840; }
  .card-topbar .tab-name {
    font-size: 11px; color: var(--muted); font-family: var(--mono);
    flex: 1; text-align: center;
  }
  .expand-icon { color: var(--muted); opacity: 0; transition: opacity 0.15s; flex-shrink: 0; }
  .dash-card:hover .expand-icon { opacity: 1; }
  .expand-icon svg { width: 12px; height: 12px; }

  .card-frame-wrap {
    height: 220px;
    position: relative;
    overflow: hidden;
    background: #111621;
  }
  .card-frame-wrap iframe {
    width: 200%;
    height: 200%;
    transform: scale(0.5);
    transform-origin: top left;
    border: none;
    pointer-events: none;
  }
  .card-overlay {
    position: absolute; inset: 0;
    background: transparent;
    cursor: pointer;
  }

  .card-footer {
    padding: 10px 14px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .card-name {
    font-size: 13px; font-weight: 500; color: var(--text);
  }
  .card-tag {
    font-size: 11px; padding: 2px 8px; border-radius: 4px;
    background: var(--surface2); color: var(--muted);
    font-family: var(--mono);
  }

  /* FOCUS VIEW */
  .focus-toolbar {
    padding: 12px 20px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .focus-title { font-size: 15px; font-weight: 600; flex: 1; letter-spacing: -0.3px; }
  .focus-sub { font-size: 12px; color: var(--muted); font-family: var(--mono); margin-left: 8px; font-weight: 400; }

  .nav-btn {
    width: 32px; height: 32px; border-radius: 7px;
    background: var(--surface2); border: 1px solid var(--border2); color: var(--muted);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.12s;
  }
  .nav-btn:hover:not(:disabled) { background: var(--surface); color: var(--text); border-color: var(--accent); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-btn svg { width: 14px; height: 14px; }

  .focus-iframe-wrap {
    flex: 1; min-height: 0; position: relative;
  }
  .focus-iframe-wrap iframe {
    width: 100%; height: 100%; border: none;
  }

  .focus-strip {
    height: 90px;
    padding: 8px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    overflow-x: auto;
    flex-shrink: 0;
  }
  .strip-thumb {
    height: 70px; width: 110px;
    border-radius: 7px; overflow: hidden;
    border: 2px solid var(--border);
    cursor: pointer; flex-shrink: 0;
    background: var(--surface2);
    transition: border-color 0.12s;
    position: relative;
  }
  .strip-thumb:hover { border-color: var(--border2); }
  .strip-thumb.active { border-color: var(--accent); }
  .strip-thumb iframe {
    width: 300%; height: 300%;
    transform: scale(0.333);
    transform-origin: top left;
    border: none; pointer-events: none;
  }
  .strip-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    padding: 4px 6px;
    font-size: 9px; color: rgba(255,255,255,0.7);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* SETTINGS MODAL */
  .modal-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px;
    width: 620px; max-height: 80vh;
    display: flex; flex-direction: column;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
  }
  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-header h2 { font-size: 16px; font-weight: 600; }
  .modal-header p { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .modal-close {
    width: 28px; height: 28px; border-radius: 6px;
    background: var(--surface2); border: none; color: var(--muted);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: all 0.12s;
  }
  .modal-close:hover { background: var(--surface); color: var(--text); }
  .modal-body {
    padding: 20px 24px; overflow-y: auto; flex: 1;
    display: flex; flex-direction: column; gap: 14px;
  }
  .field-row {
    display: grid; grid-template-columns: 36px 1fr 1fr; gap: 10px; align-items: start;
  }
  .field-num {
    height: 36px; display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-family: var(--mono); color: var(--muted);
    background: var(--surface2); border-radius: 6px; border: 1px solid var(--border);
  }
  .field-row input {
    height: 36px; border-radius: 7px;
    background: var(--surface2); border: 1px solid var(--border2);
    color: var(--text); font-family: var(--font); font-size: 13px;
    padding: 0 12px; outline: none; transition: border-color 0.12s;
    width: 100%;
  }
  .field-row input:focus { border-color: var(--accent); }
  .field-row input::placeholder { color: var(--muted); font-size: 12px; }
  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex; gap: 10px; justify-content: flex-end;
  }

  /* SCROLLBARS */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

  /* FULLSCREEN hint */
  .fs-badge {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--surface); border: 1px solid var(--border2);
    padding: 8px 14px; border-radius: 8px;
    font-size: 12px; color: var(--muted);
    pointer-events: none; opacity: 0; transition: opacity 0.3s;
    z-index: 50;
  }
  .fs-badge.show { opacity: 1; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 16 16"><path d="M2 10h4v4H2zM6 6h4v8H6zM10 2h4v12h-4z"/></svg>
    </div>
    <div class="logo-text"><span>LT</span> Dashboard Hub</div>
  </div>
  <div class="header-divider"></div>
  <div class="page-title">Consolidated Dashboard View</div>
  <div class="spacer"></div>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="btn btn-ghost" id="btn-grid" onclick="switchView('grid')">
      <svg viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
      <span>Overview</span>
    </button>
    <button class="btn btn-ghost" id="btn-fullscreen" onclick="toggleFullscreen()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 5V2h3M12 2h3v3M1 11v3h3M12 14h3v-3"/></svg>
      <span>Fullscreen</span>
    </button>
    <button class="btn btn-accent" onclick="openSettings()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="2.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.1 3.1l1.4 1.4M11.5 11.5l1.4 1.4M3.1 12.9l1.4-1.4M11.5 4.5l1.4-1.4"/></svg>
      <span>Configure URLs</span>
    </button>
  </div>
</header>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-label">Dashboards</span>
      <button class="collapse-btn" onclick="toggleSidebar()" title="Collapse">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 3L5 8l5 5"/></svg>
      </button>
    </div>
    <ul class="nav-list" id="nav-list"></ul>
    <div class="sidebar-footer">
      <button class="btn btn-ghost" style="width:100%" onclick="openSettings()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="width:14px;height:14px"><circle cx="8" cy="8" r="2.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2"/></svg>
        <span>Configure URLs</span>
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main>

    <!-- GRID VIEW -->
    <div class="view active" id="view-grid">
      <div class="grid-header">
        <h1>All Dashboards</h1>
        <span class="badge" id="db-count">6 reports</span>
        <div class="spacer"></div>
        <div class="grid-controls">
          <button class="btn btn-ghost" onclick="reloadAll()" title="Reload all">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 8a6 6 0 1 0 1-3.3"/><path d="M2 3v3h3"/></svg>
          </button>
        </div>
      </div>
      <div class="grid-scroll">
        <div class="dashboard-grid" id="dashboard-grid"></div>
      </div>
    </div>

    <!-- FOCUS VIEW -->
    <div class="view" id="view-focus">
      <div class="focus-toolbar">
        <button class="btn btn-ghost" onclick="switchView('grid')">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="width:14px;height:14px"><path d="M10 3L5 8l5 5"/></svg>
          <span>Back</span>
        </button>
        <div class="header-divider"></div>
        <div class="focus-title" id="focus-title">Dashboard 1 <span class="focus-sub" id="focus-counter">1 / 6</span></div>
        <div class="spacer"></div>
        <button class="nav-btn" id="btn-prev" onclick="navigate(-1)" title="Previous">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 3L5 8l5 5"/></svg>
        </button>
        <button class="nav-btn" id="btn-next" onclick="navigate(1)" title="Next">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 3l5 5-5 5"/></svg>
        </button>
        <button class="btn btn-ghost" onclick="reloadFocused()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="width:14px;height:14px"><path d="M2 8a6 6 0 1 0 1-3.3"/><path d="M2 3v3h3"/></svg>
          <span>Reload</span>
        </button>
      </div>
      <div class="focus-iframe-wrap">
        <iframe id="focus-iframe" src="" allowfullscreen></iframe>
      </div>
      <div class="focus-strip" id="focus-strip"></div>
    </div>

  </main>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-header">
      <div>
        <h2>Configure Dashboard URLs</h2>
        <p>Paste your Power BI embed URLs. Names are optional labels.</p>
      </div>
      <button class="modal-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeSettings()">Cancel</button>
      <button class="btn btn-accent" onclick="saveSettings()">Save & Apply</button>
    </div>
  </div>
</div>

<div class="fs-badge" id="fs-badge">Press F11 for fullscreen</div>

<script>
const DEFAULT = [
  { name: 'Dashboard 1', url: '' },
  { name: 'Dashboard 2', url: '' },
  { name: 'Dashboard 3', url: '' },
  { name: 'Dashboard 4', url: '' },
  { name: 'Dashboard 5', url: '' },
  { name: 'Dashboard 6', url: '' },
];

let dashboards = JSON.parse(localStorage.getItem('lt_dashboards') || 'null') || DEFAULT;
let currentView = 'grid';
let focusedIndex = 0;
let sidebarCollapsed = false;

function save() {
  localStorage.setItem('lt_dashboards', JSON.stringify(dashboards));
}

function renderAll() {
  renderSidebar();
  renderGrid();
  renderStrip();
  document.getElementById('db-count').textContent = dashboards.length + ' reports';
}

function renderSidebar() {
  const ul = document.getElementById('nav-list');
  ul.innerHTML = dashboards.map((d, i) => `
    <li class="nav-item ${i === focusedIndex && currentView === 'focus' ? 'active' : ''}"
        onclick="openFocus(${i})">
      <span class="nav-num">${i + 1}</span>
      <span class="nav-name">${d.name || 'Dashboard ' + (i+1)}</span>
      <span class="nav-status"></span>
    </li>
  `).join('');
}

function renderGrid() {
  const grid = document.getElementById('dashboard-grid');
  grid.innerHTML = dashboards.map((d, i) => {
    const name = d.name || 'Dashboard ' + (i+1);
    const src = d.url || 'about:blank';
    return `
    <div class="dash-card" onclick="openFocus(${i})">
      <div class="card-topbar">
        <div class="dots">
          <div class="dot dot-r"></div>
          <div class="dot dot-y"></div>
          <div class="dot dot-g"></div>
        </div>
        <span class="tab-name">${name}</span>
        <span class="expand-icon">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 1h6v6M7 9L15 1M1 7v8h8"/></svg>
        </span>
      </div>
      <div class="card-frame-wrap">
        ${d.url
          ? `<iframe src="${escHtml(d.url)}" id="grid-iframe-${i}" allowfullscreen sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>`
          : `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;opacity:0.4">
               <svg width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1"><rect x="5" y="18" width="8" height="16" rx="1"/><rect x="16" y="10" width="8" height="24" rx="1"/><rect x="27" y="4" width="8" height="30" rx="1"/></svg>
               <span style="font-size:11px;font-family:var(--mono);color:var(--muted)">No URL configured</span>
             </div>`
        }
        <div class="card-overlay"></div>
      </div>
      <div class="card-footer">
        <span class="card-name">${name}</span>
        <span class="card-tag">PBI · ${i+1}</span>
      </div>
    </div>`;
  }).join('');
}

function renderStrip() {
  const strip = document.getElementById('focus-strip');
  strip.innerHTML = dashboards.map((d, i) => `
    <div class="strip-thumb ${i === focusedIndex ? 'active' : ''}" onclick="openFocus(${i})">
      ${d.url
        ? `<iframe src="${escHtml(d.url)}" sandbox="allow-scripts allow-same-origin" tabindex="-1"></iframe>`
        : `<div style="display:flex;align-items:center;justify-content:center;height:100%;opacity:0.3;font-size:10px;color:var(--muted)">No URL</div>`
      }
      <div class="strip-label">${d.name || 'Dashboard ' + (i+1)}</div>
    </div>
  `).join('');
}

function switchView(view) {
  currentView = view;
  document.getElementById('view-grid').classList.toggle('active', view === 'grid');
  document.getElementById('view-focus').classList.toggle('active', view === 'focus');
  renderSidebar();
}

function openFocus(index) {
  focusedIndex = index;
  const d = dashboards[index];
  const name = d.name || 'Dashboard ' + (index+1);
  document.getElementById('focus-title').innerHTML =
    name + ` <span class="focus-sub" id="focus-counter">${index + 1} / ${dashboards.length}</span>`;
  document.getElementById('focus-iframe').src = d.url || 'about:blank';
  document.getElementById('btn-prev').disabled = index === 0;
  document.getElementById('btn-next').disabled = index === dashboards.length - 1;
  renderStrip();
  switchView('focus');
}

function navigate(dir) {
  const next = focusedIndex + dir;
  if (next >= 0 && next < dashboards.length) openFocus(next);
}

function reloadFocused() {
  const iframe = document.getElementById('focus-iframe');
  const src = iframe.src;
  iframe.src = '';
  setTimeout(() => iframe.src = src, 50);
}

function reloadAll() {
  renderGrid();
}

function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed;
  document.getElementById('sidebar').classList.toggle('collapsed', sidebarCollapsed);
}

function openSettings() {
  const body = document.getElementById('modal-body');
  body.innerHTML = `
    <div style="display:grid;grid-template-columns:36px 1fr 1fr;gap:10px;padding-bottom:8px;border-bottom:1px solid var(--border)">
      <div></div>
      <div style="font-size:11px;color:var(--muted);font-weight:600;letter-spacing:0.5px;text-transform:uppercase;padding-left:4px">Label</div>
      <div style="font-size:11px;color:var(--muted);font-weight:600;letter-spacing:0.5px;text-transform:uppercase;padding-left:4px">Embed URL</div>
    </div>
    ${dashboards.map((d,i) => `
    <div class="field-row">
      <div class="field-num">${i+1}</div>
      <input type="text" id="cfg-name-${i}" value="${escHtml(d.name)}" placeholder="Dashboard ${i+1}">
      <input type="url" id="cfg-url-${i}" value="${escHtml(d.url)}" placeholder="https://app.powerbi.com/...">
    </div>
    `).join('')}
    <p style="font-size:11px;color:var(--muted);margin-top:8px;line-height:1.6">
      💡 Use the <strong style="color:var(--text)">Publish to web</strong> embed URL from Power BI, or your organization's embed link from <em>File → Embed report → Website or portal</em>.
    </p>
  `;
  document.getElementById('modal-bg').classList.add('open');
}

function closeSettings() {
  document.getElementById('modal-bg').classList.remove('open');
}

function saveSettings() {
  dashboards = dashboards.map((_, i) => ({
    name: document.getElementById(`cfg-name-${i}`).value.trim() || ('Dashboard ' + (i+1)),
    url: document.getElementById(`cfg-url-${i}`).value.trim()
  }));
  save();
  renderAll();
  closeSettings();
}

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
    showBadge('Press Esc to exit fullscreen');
  } else {
    document.exitFullscreen();
  }
}

function showBadge(msg) {
  const el = document.getElementById('fs-badge');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('modal-bg').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-bg')) closeSettings();
});

document.addEventListener('keydown', e => {
  if (currentView === 'focus') {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') navigate(-1);
    if (e.key === 'Escape') switchView('grid');
  }
  if (e.key === 'F11') { e.preventDefault(); toggleFullscreen(); }
});

renderAll();
showBadge('Press F11 for fullscreen · ← → to navigate');
</script>
</body>
</html>
